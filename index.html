<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adding to Calendar…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0A0A0A;
      color: #F5F0EB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      max-width: 400px;
      padding: 48px 40px;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #E8291C;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .icon svg { width: 32px; height: 32px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; letter-spacing: -0.02em; }
    p { font-size: 14px; color: rgba(245,240,235,0.5); line-height: 1.6; margin-bottom: 28px; }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px 28px;
      background: #E8291C;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-radius: 6px;
      margin-bottom: 10px;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #c72216; }
    .btn-secondary {
      display: block;
      width: 100%;
      padding: 14px 28px;
      background: transparent;
      color: rgba(245,240,235,0.6);
      text-decoration: none;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.3); color: #F5F0EB; }
    .note { margin-top: 24px; font-size: 12px; color: rgba(245,240,235,0.25); line-height: 1.6; }
    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <polyline points="9 16 11 18 15 14"/>
      </svg>
    </div>
    <h1>Opening your calendar…</h1>
    <p>Your calendar app should open automatically.<br>If nothing happens, use the buttons below.</p>
    <a class="btn-primary" id="webcal-btn" href="#">
      Open in Calendar App
    </a>
    <a class="btn-secondary" id="download-btn" href="#">
      Download .ics file instead
    </a>
    <p class="note">Works with Apple Calendar, Outlook & most calendar apps.<br>For Google Calendar, download the file and import it manually.</p>
  </div>

  <script>
    // Build the ICS URL relative to this page so it works on any GitHub Pages repo
    const base = window.location.href.replace(/\/[^/]*$/, '/');
    const icsFile = base + 'Adobe-Summit-IBM-Sessions.ics';

    document.getElementById('webcal-btn').href = icsFile.replace(/^https?:\/\//, 'webcal://');
    document.getElementById('download-btn').href = icsFile;
    document.getElementById('download-btn').setAttribute('download', 'Adobe-Summit-IBM-Sessions.ics');

    // Auto-trigger on load
    window.location.href = icsFile.replace(/^https?:\/\//, 'webcal://');
  </script>
</body>
</html>
